# $OpenBSD: unbound.conf,v 1.21 2020/10/28 11:35:58 sthen Exp $

server:
    username: _unbound
    directory: /var/unbound
    chroot: /var/unbound
    pidfile: /var/run/unbound.pid

	interface: 127.0.0.1
    interface: ::1
	interface: 10.0.0.1

	#outgoing-interface: 10.0.0.30
	#outgoing-interface: 2001:db8::53

	access-control: 0.0.0.0/0 refuse
	access-control: 127.0.0.0/8 allow
    access-control: 10.0.0.0/24 allow
    access-control: ::0/0 refuse
	access-control: ::1 allow

	hide-identity: yes
	hide-version: yes
    qname-minimisation: yes
    
    # DNS ROOT-SERVERS information 
    # This file hold the information on root name servers needed to
    # initialize cache of Internet domain name servers
    # (e.g. reference this file in the "cache . <file>"
    # configuration file of BIND domain name servers).
    # ftp ftp://FTP.INTERNIC.NET/domain/named.cache    
    root-hints: /var/unbound/etc/root.hints

	# Perform DNSSEC validation.
	auto-trust-anchor-file: "/var/unbound/db/root.key"
	val-log-level: 2
    
    so-sndbuf: 0
    port: 53

	# Synthesize NXDOMAINs from DNSSEC NSEC chains.
	# https://tools.ietf.org/html/rfc8198
	aggressive-nsec: yes

	# CA Certificates used for forward-tls-upstream (RFC7858) hostname
	# verification.  Since it's outside the chroot it is only loaded at
	# startup and thus cannot be changed via a reload.
	tls-cert-bundle: "/etc/ssl/cert.pem"

include: /var/unbound/etc/local-zones.conf
include: /var/unbound/etc/forward-zones.conf
include: /var/ubbound/etc/conf.d/*.conf

remote-control:
	control-enable: yes
	control-interface: /var/run/unbound.sock

