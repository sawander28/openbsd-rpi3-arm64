# $OpenBSD: unbound.conf,v 1.21 20250320 wandsas Exp $

server:
	port: 53
	username: _unbound
	directory: /var/unbound
	chroot: /var/unbound
	pidfile: /var/run/unbound.pid
	do-ip6: yes
	so-sndbuf: 0

	interface: 127.0.0.1
	#interface: 127.0.0.1@1053	# listen on alternative port
	interface: ::1
	interface: 192.168.1.1
	interface: 2001:db8:acab::1

	# override the default "any" address to send queries; if multiple
	# addresses are available, they are used randomly to counter spoofing
	#outgound-interface: 2001:db8:acab::5

	access-control: 0.0.0.0/0 refuse
	access-control: ::0/0 refuse
	access-control: 127.0.0.0/8 allow
	access-control: ::1 allow
	access-control: 192.168.1.0/24 allow
	access-control: 2001:db8:acab::/64 allow

	hide-identity: yes
	hide-version: yes
	qname-minimisation: yes

	# Perform DNSSEC validation.
	#
	auto-trust-anchor-file: "/var/unbound/db/root.key"
	val-log-level: 2

	# DNS ROOT-SERVERS info
	#
	# This file is hold the information on root name servers needed to
	# initialize cache of Internet domain name servers
	# (e.g. reference this in file in "cache . <file>"
	# configuration file of BIND domain name servers).
	# curl -L ftp://FTP.INTERNIC.NET/domain/named.cache -o /var/unbound/etc/root.hints
	root-hints: /var/unbound/etc/root.hints

	# Synthesize NXDOMAINs from DNSSEC NSEC chains.
	# https://tools.ietf.org/html/rfc8198
	#
	aggressive-nsec: yes

	# CA Certificates used for forward-tls-upstream (RFC7858) hostname
	# verification. Since it's outside the chroot it is only loaded at
	# startup and thus cannot be changed via a reload.
	tls-cert-bundle: "/etc/ssl/cert.pem"

include: /var/unbound/etc/forward.conf
include: /var/unbound/etc/lan-zones.conf
include: /var/unbound/etc/control.conf
include: /var/unbound/etc/conf.d/*.conf
