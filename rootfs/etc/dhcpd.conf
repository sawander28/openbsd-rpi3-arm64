#	$OpenBSD: dhcpd.cof,v 1.1 2014/07/11 21:20:10 wandsas Exp $
#
# DHCP server options.
# See dhcpd.conf(5) and dhcpd(8) for more information.
#

# Network:		192.168.1.0/24
# Domain name:		lan.local
# Name servers:		192.168.1.1
# Default router:	192.168.1.1
# Addresses:		192.168.1.32 - 192.168.1.127
#

subnet 192.168.0.0 netmask 255.255.255.0 {
	option subnet-mask 255.255.255.0;
	option broadcast-address 192.168.0.255;
	option routers 192.168.0.1;
	range 192.168.0.32 192.168.0.33;
}

subnet 192.168.1.0 netmask 255.255.255.0 {
	option subnet-mask 255.255.255.0;
	option broadcast-address 192.168.1.255;
	option routers 192.168.1.1;
	option ntp-servers 192.168.1.1;
	option  domain-name "lan.local";
	option  domain-name-servers 192.168.1.1;

	range 192.168.1.32 192.168.1.127;

	host z620 {
		hardware ethernet 88:51:fb:3f:2c:e4;
		fixed-address 192.168.1.20;
		server-name "z620.lan.local";
	}
	host z620 {
		hardware ethernet 02:03:04:07:06:05;
		fixed-address 192.168.1.50;
		server-name "z600.lan.local";
	}

	host pxe-client {  
		hardware ethernet 02:03:04:05:06:07;
		filename "pxeboot";
		next-server 192.168.1.1;
	}
}
