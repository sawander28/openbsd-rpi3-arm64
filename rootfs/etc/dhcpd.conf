authoritative;

# zone: wan
subnet 192.168.1.0 netmask 255.255.255.0 {
    range 192.168.1.2 192.168.1.3;
    option broadcast-address 192.168.1.255;
    option subnet-mask 255.255.255.0;
    option routers 192.168.1.1;
    host rpi3 {
	hardware ethernet 28:37:37:02:31:c6;
	fixed-address 192.168.1.2;
    } 
}
# zone: lan
subnet 192.168.2.0 netmask 255.255.255.0 {
    range 192.168.2.101 192.168.2.150;
    option broadcast-address 192.168.2.255;
    option subnet-mask 255.255.255.0;
    option routers 192.168.2.1;
    option ntp-servers 192.168.2.1;
    option domain-name-servers 192.168.2.1;
    option domain-name "lan.local";

    host z620 {
        hardware ethernet 88:51:fb:3f:2c:e4;
        fixed-address 192.168.2.20;
        server-name "z620.lan.local";
    }
    host z600 {
        hardware ethernet 2c:27:d7:35:97:bc;
        fixed-address 192.168.2.50;
        server-name "z600.lan.local";
    }
}


